backend = "glx";

# Blur behind transparent/inactive windows
blur-background = true;
blur-method = "dual_kawase";
blur-strength = 7;

# Focus differentiation
active-opacity = 0.93;
inactive-opacity = 0.78;
inactive-dim = 0.08;

# Exclude picom's own transparency rules from system bars
opacity-rule = [
  "100:class_g = 'Polybar'",
  "100:class_g = 'firefox-esr'",
  "100:class_g = 'Firefox-esr'",
  "100:class_g = 'brave-browser'",
  "100:class_g = 'Brave-browser'",
  "100:class_g = 'google-chrome'",
  "100:class_g = 'Google-chrome'",
  "100:class_g = 'chromium-browser'",
  "100:class_g = 'Chromium-browser'",
  "100:class_g = 'Comet'",
  "100:class_g = 'comet'"
];

# Don't blur certain windows
blur-background-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'Rofi'",
  "class_g = 'firefox-esr'",
  "class_g = 'Firefox-esr'",
  "class_g = 'brave-browser'",
  "class_g = 'Brave-browser'",
  "class_g = 'google-chrome'",
  "class_g = 'Google-chrome'",
  "class_g = 'chromium-browser'",
  "class_g = 'Chromium-browser'",
  "class_g = 'Comet'",
  "class_g = 'comet'",
  "_NET_WM_STATE@:32a *= '_NET_WM_STATE_FULLSCREEN'"
];

# No shadows
shadow = false;
