backend = "glx";

# Blur behind transparent/inactive windows
blur-background = true;
blur-method = "dual_kawase";
blur-strength = 7;

# Focus differentiation
active-opacity = 0.93;
inactive-opacity = 0.78;
inactive-dim = 0.08;

# Exclude picom's own transparency rules from system bars
opacity-rule = [
  "100:class_g = 'Polybar'"
];

# Don't blur certain windows
blur-background-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'Rofi'",
  "_NET_WM_STATE@:32a *= '_NET_WM_STATE_FULLSCREEN'"
];

# No shadows
shadow = false;
