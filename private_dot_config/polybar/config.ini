[colors]
; Omarchy-style theme - Nord-inspired
bg = #2e3440
bg-alt = #3b4252
fg = #eceff4
fg-dim = #81a1c1

accent = #88c0d0
green = #a3be8c
yellow = #ebcb8b
red = #bf616a
purple = #b48ead

transparent = #00000000

[bar/main]
width = 100%
height = 30
radius = 0
bottom = false
top = true
offset-x = 0
offset-y = 0

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 0

border-size = 0

padding-left = 10
padding-right = 10
module-margin-left = 6
module-margin-right = 6

font-0 = "JetBrainsMono Nerd Font:size=11;2"
font-1 = "Symbols Nerd Font:size=11;2"

modules-left = i3
modules-center = 
modules-right = volume memory cpu battery date

tray-position = right
tray-padding = 6

enable-ipc = true

[module/i3]
type = internal/i3
format = <label-state>
format-padding = 5

label-active = %name%
label-active-foreground = ${colors.fg}
label-active-background = ${colors.bg-alt}

label-occupied = %name%
label-occupied-foreground = ${colors.fg-dim}

label-urgent = %name%
label-urgent-foreground = ${colors.red}

label-empty = %name%
label-empty-foreground = ${colors.bg-alt}

[module/volume]
type = internal/pulseaudio
format = <label-volume>
format-prefix = "🔊 "
format-prefix-foreground = ${colors.fg-dim}
format-volume = <label-volume>
format-volume-foreground = ${colors.fg}

label-volume = %percentage%%
label-muted = 🔇
label-muted-foreground = ${colors.red}

[module/memory]
type = internal/memory
format = <label>
format-prefix = "💾 "
format-prefix-foreground = ${colors.fg-dim}
format-foreground = ${colors.fg}
label = %percentage:0%%

[module/cpu]
type = internal/cpu
format = <label>
format-prefix = "⚡ "
format-prefix-foreground = ${colors.yellow}
format-foreground = ${colors.fg}
label = %percentage:0%%

[module/battery]
type = internal/battery
format = <label>
format-charging = <label>
format-charging-prefix = "⚡ "
format-charging-prefix-foreground = ${colors.green}
format-discharging = <label>
format-discharging-prefix = "🔋 "
format-discharging-prefix-foreground = ${colors.fg-dim}
format-full = <label>
format-full-prefix = "✓ "
format-full-prefix-foreground = ${colors.green}

label = %percentage:0%%
label-foreground = ${colors.fg}

[module/date]
type = internal/date
format = <label>
format-prefix = "🕐 "
format-prefix-foreground = ${colors.purple}
format-foreground = ${colors.fg}
label = %H:%M

interval = 1

[settings]
screenchange-reload = true