;==========================================================================
;  Minimal Polybar . Omarchy square workspaces . floating rounded bar
;  Managed via chezmoi (private_dot_config/polybar/config.ini)
;  GENERATED: glyphs via chr(0xNNNN) in a Python heredoc (pasted glyphs strip).
;  Icons pinned to font-1 (%{T2}) for uniform size; square = font-2 (%{T3}).
;  Colours inside %{F..}/%{B..} MUST be literal hex.
;==========================================================================

[colors]
base     = #11111b
text     = #cdd6f4
subtext  = #585b70
blue     = #89b4fa
mauve    = #cba6f7
green    = #a6e3a1
peach    = #fab387
teal     = #94e2d5
yellow   = #f9e2af
red      = #f38ba8

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 28
offset-x = 0
offset-y = 0
radius = 5
bottom = false
fixed-center = true
background = ${colors.base}
foreground = ${colors.text}
line-size = 2pt
border-size = 0
padding-left = 1
padding-right = 1
module-margin = 1
separator = %{F#585b70}·%{F-}
; font-0 text/values | font-1 icons | font-2 workspace square | font-3 symbol fallback
font-0 = JetBrainsMono Nerd Font:size=11;3
font-1 = JetBrainsMono Nerd Font:size=12;3
font-2 = JetBrainsMono Nerd Font:size=15;4
font-3 = Symbols Nerd Font:size=12;3
modules-left = i3
modules-center = title
modules-right = volume memory cpu wlan battery date
wm-restack = i3
enable-ipc = true
cursor-click = pointer

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true
enable-click = true
enable-scroll = false
; focused = solid white square (no number); others = dim numbers
label-focused = %{T3}%{F#cdd6f4}%{T-}%{F-}
label-focused-padding = 1
label-visible = %{T3}%{F#585b70}%{T-}%{F-}
label-visible-padding = 1
label-urgent = %{T3}%{F#f38ba8}%{T-}%{F-}
label-urgent-padding = 1
label-unfocused = %name%
label-unfocused-foreground = ${colors.subtext}
label-unfocused-padding = 1

[module/title]
type = internal/xwindow
label = %title:0:90:...%
label-foreground = ${colors.subtext}
label-empty =

[module/volume]
type = internal/pulseaudio
use-ui-max = false
label-volume = %percentage%%
format-volume = %{F#89b4fa}%{T2}%{T-}%{F#cdd6f4}  <label-volume>
format-muted = %{F#f38ba8}%{T2}%{T-}%{F#cdd6f4}  muted
click-left = regolith-control-center sound &
click-right = pavucontrol &

[module/memory]
type = internal/memory
interval = 3
label = %gb_used%
format = %{F#a6e3a1}%{T2}%{T-}%{F#cdd6f4}  <label>
click-left = gnome-system-monitor &

[module/cpu]
type = internal/cpu
interval = 2
label = %percentage:2%%
format = %{F#fab387}%{T2}%{T-}%{F#cdd6f4}  <label>
click-left = gnome-system-monitor &

[module/wlan]
type = internal/network
interface-type = wireless
interval = 5
label-connected = %essid%
format-connected = %{F#94e2d5}%{T2}%{T-}%{F#cdd6f4}  <label-connected>
format-disconnected = %{F#f38ba8}%{T2}%{T-}%{F#cdd6f4}  off
click-left = regolith-control-center wifi &

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98
low-at = 15
label-charging = %percentage%%
label-discharging = %percentage%%
label-full = %percentage%%
format-charging = %{F#f9e2af}%{T2}%{T-}%{F#cdd6f4}  <label-charging>
format-discharging = %{F#f9e2af}%{T2}%{T-}%{F#cdd6f4}  <label-discharging>
format-full = %{F#a6e3a1}%{T2}%{T-}%{F#cdd6f4}  <label-full>
click-left = regolith-control-center power &

[module/date]
type = internal/date
interval = 10
date = %m/%d
time = %H:%M
label = %date%  %time%
format = %{F#cba6f7}%{T2}%{T-}%{F#cdd6f4}  <label>
click-left = gnome-calendar &
click-right = regolith-control-center datetime &

; vim:ft=dosini
