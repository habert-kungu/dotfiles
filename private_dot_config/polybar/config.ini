[colors]
; Catppuccin Mocha Theme
bg = #1e1e2e
bg-alt = #313244
fg = #cdd6f4
fg-alt = #a6adc8

; Accent colors
accent = #89b4fa
primary = #f5c2e7
secondary = #94e2d5
success = #a6e3a1
warning = #f9e2af
error = #f38ba8

; Module colors
mem-color = #f38ba8
cpu-color = #fab387
vol-color = #89dceb
wifi-color = #a6e3a1
date-color = #cba6f7
bat-color = #94e2d5
workspace-active = #89b4fa
workspace-occupied = #9399b2
workspace-urgent = #f38ba8

transparent = #00000000

[bar/main]
width = 100%
height = 32
radius = 8
bottom = false
top = true
offset-x = 0
offset-y = 0

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 2
line-color = ${colors.accent}

border-size = 0
border-color = ${colors.bg-alt}

padding-left = 8
padding-right = 8
module-margin-left = 4
module-margin-right = 4

font-0 = "JetBrainsMono Nerd Font:size=10;3"
font-1 = "SymbolsNerdFont:size=10;3"

modules-left = i3
modules-center = 
modules-right = volume memory cpu battery date

tray-position = right
tray-padding = 8
tray-maxsize = 20

enable-ipc = true

[module/i3]
type = internal/i3
format = <label-state>
format-padding = 4

label-active = %name%
label-active-foreground = ${colors.workspace-active}
label-active-background = ${colors.bg-alt}

label-occupied = %name%
label-occupied-foreground = ${colors.workspace-occupied}
label-occupied-background = ${colors.bg-alt}

label-urgent = %name%
label-urgent-foreground = ${colors.workspace-urgent}
label-urgent-background = ${colors.bg-alt}

label-empty = %name%
label-empty-foreground = ${colors.fg-alt}
label-empty-background = ${colors.bg-alt}

ws-icon-0 = 1;一
ws-icon-1 = 2;二
ws-icon-2 = 3;三
ws-icon-3 = 4;四
ws-icon-4 = 5;五
ws-icon-5 = 6;六
ws-icon-6 = 7;七
ws-icon-7 = 8;八
ws-icon-8 = 9;九
ws-icon-9 = 10;十

[module/volume]
type = internal/pulseaudio
format = <label-volume>
format-prefix = "󰝤 "
format-prefix-foreground = ${colors.vol-color}
format-volume = <label-volume>
format-volume-foreground = ${colors.fg}

label-volume = %percentage%%
label-muted = 󰝟
label-muted-foreground = ${colors.fg-alt}

[module/memory]
type = internal/memory
format = <label>
format-prefix = "󰍛 "
format-prefix-foreground = ${colors.mem-color}
format = <label>
format-foreground = ${colors.fg}
label = %percentage:1%%

[module/cpu]
type = internal/cpu
format = <label>
format-prefix = "󰻞 "
format-prefix-foreground = ${colors.cpu-color}
format = <label>
format-foreground = ${colors.fg}
label = %percentage:1%%

[module/battery]
type = internal/battery
format = <label>
format-charging = <label>
format-charging-prefix = "󰂄 "
format-charging-prefix-foreground = ${colors.success}
format-discharging = <label>
format-discharging-prefix = "󰁾 "
format-discharging-prefix-foreground = ${colors.bat-color}
format-full = <label>
format-full-prefix = "󰁹 "
format-full-prefix-foreground = ${colors.success}

label = %percentage:1%%
label-foreground = ${colors.fg}
label-charging-foreground = ${colors.fg}
label-discharging-foreground = ${colors.fg}
label-full-foreground = ${colors.success}

[module/date]
type = internal/date
format = <label>
format-prefix = "󰃭 "
format-prefix-foreground = ${colors.date-color}
format = <label>
format-foreground = ${colors.fg}
label = %H:%M

interval = 1

[settings]
screenchange-reload = true