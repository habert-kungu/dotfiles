[colors]
; Dark Minimal Theme - Almost Black
bg = #000000
bg-alt = #0d0d0d
fg = #ffffff
fg-alt = #666666

accent = #00ff00
dim = #333333

transparent = #00000000

[bar/main]
width = 100%
height = 28
radius = 0
bottom = false
top = true
offset-x = 0
offset-y = 0

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 0

border-size = 0

padding-left = 12
padding-right = 12
module-margin-left = 8
module-margin-right = 8

font-0 = "monospace:size=10;2"

modules-left = i3
modules-center = 
modules-right = volume memory cpu battery date

tray-position = right
tray-padding = 8

enable-ipc = true

[module/i3]
type = internal/i3
format = <label-state>
format-padding = 6

label-active = %name%
label-active-foreground = ${colors.fg}
label-active-background = ${colors.bg-alt}

label-occupied = %name%
label-occupied-foreground = ${colors.fg-alt}
label-occupied-background = ${colors.bg}

label-urgent = %name%
label-urgent-foreground = ${colors.accent}
label-urgent-background = ${colors.bg}

label-empty = %name%
label-empty-foreground = ${colors.dim}
label-empty-background = ${colors.bg}

[module/volume]
type = internal/pulseaudio
format = <label-volume>
format-volume = <label-volume>
format-volume-foreground = ${colors.fg}

label-volume = %percentage%%
label-muted = --
label-muted-foreground = ${colors.dim}

[module/memory]
type = internal/memory
format = <label>
format-foreground = ${colors.fg}
label = %percentage:0%%

[module/cpu]
type = internal/cpu
format = <label>
format-foreground = ${colors.fg}
label = %percentage:0%%

[module/battery]
type = internal/battery
format = <label>
format-foreground = ${colors.fg}
label = %percentage:0%%

label-charging-foreground = ${colors.fg}
label-discharging-foreground = ${colors.fg}
label-full-foreground = ${colors.fg}

[module/date]
type = internal/date
format = <label>
format-foreground = ${colors.fg}
label = %H:%M

interval = 1

[settings]
screenchange-reload = true