; ─────────────────────────────────────────────────────────────
;  polybar — minimal, monochrome (just get out of the way)
; ─────────────────────────────────────────────────────────────

[colors]
background = #1c1c1c
foreground = #cdd6f4
muted      = #585b70
accent     = #89b4fa
warn       = #f38ba8

[bar/bar]
width            = 100%
height           = 30pt
radius           = 0
fixed-center     = true

background       = ${colors.background}
foreground       = ${colors.foreground}

line-size        = 2pt
border-size      = 0

padding-left     = 1
padding-right    = 1
module-margin    = 1

separator        =
separator-foreground = ${colors.muted}

font-0 = JetBrainsMono Nerd Font:size=13;3
font-1 = JetBrainsMono Nerd Font:style=Bold:size=13;3
font-2 = Symbols Nerd Font:size=17;4
font-3 = Symbols Nerd Font Mono:size=17;4

modules-left   = xworkspaces xwindow
modules-center =
modules-right  = pulseaudio memory cpu wlan eth bluetooth battery date tray

cursor-click     = pointer
cursor-scroll    = ns-resize

enable-ipc       = true
wm-restack       = i3

[module/xworkspaces]
type = internal/xworkspaces

label-active            = %name%
label-active-foreground = ${colors.foreground}
label-active-underline  = ${colors.accent}
label-active-padding    = 1

label-occupied          = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding  = 1

label-urgent            = %name%
label-urgent-foreground = ${colors.warn}
label-urgent-padding    = 1

label-empty             = %name%
label-empty-foreground  = ${colors.muted}
label-empty-padding     = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:80:…%
label-foreground = ${colors.muted}

[module/date]
type     = internal/date
interval = 5
date     = %a %d %b   %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label    = %date%
label-foreground = ${colors.foreground}

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>
label-volume  = %percentage%%
label-volume-foreground = ${colors.foreground}

format-muted        = <label-muted>
label-muted         = 󰝟 muted
label-muted-foreground = ${colors.muted}

ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀
ramp-volume-2 = 󰕾
ramp-volume-foreground = ${colors.foreground}

; volume is controlled by keybindings (F1 mute / F2 down / F3 up) in i3 config.

[module/memory]
type = internal/memory
interval = 3
format-prefix = "󰍛 "
format-prefix-foreground = ${colors.foreground}
label = %percentage_used:2%%
label-foreground = ${colors.foreground}

[module/cpu]
type = internal/cpu
interval = 3
format-prefix = " "
format-prefix-foreground = ${colors.foreground}
label = %percentage:2%%
label-foreground = ${colors.foreground}

[module/bluetooth]
type = custom/script
exec = ~/.local/bin/bluetooth_status.sh
interval = 5
format-prefix = "󰂯 "
format-prefix-foreground = ${colors.foreground}
label = %output%
label-foreground = ${colors.foreground}
click-left = blueman-manager

[network-base]
type = internal/network
interval = 3
unknown-as-up = true

[module/wlan]
inherit = network-base
interface-type = wireless

format-connected = <ramp-signal> <label-connected>
label-connected  = %essid%
label-connected-foreground = ${colors.foreground}

format-disconnected = <label-disconnected>
label-disconnected  = 󰤭
label-disconnected-foreground = ${colors.muted}

ramp-signal-0 = 󰤟
ramp-signal-1 = 󰤢
ramp-signal-2 = 󰤥
ramp-signal-3 = 󰤨
ramp-signal-foreground = ${colors.foreground}

click-left = nm-connection-editor

[module/eth]
inherit = network-base
interface = enp0s20f0u6u4

format-connected = <label-connected>
label-connected  = 󰈀 %local_ip%
label-connected-foreground = ${colors.foreground}

[module/battery]
type        = internal/battery
full-at     = 99
low-at      = 10
battery     = BAT0
adapter     = ADP1
poll-interval = 10

format-charging    = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full        = <label-full>
format-low         = <animation-low> <label-low>

label-charging    = %percentage%%
label-discharging = %percentage%%
label-full        = 󰁹 %percentage%%
label-low         = %percentage%%

label-full-foreground       = ${colors.foreground}
label-low-foreground        = ${colors.warn}
label-charging-foreground   = ${colors.foreground}
label-discharging-foreground = ${colors.foreground}

ramp-capacity-0 = 󰁺
ramp-capacity-1 = 󰁼
ramp-capacity-2 = 󰁾
ramp-capacity-3 = 󰂀
ramp-capacity-4 = 󰂂
ramp-capacity-foreground = ${colors.foreground}

animation-charging-0 = 󰂆
animation-charging-1 = 󰂇
animation-charging-2 = 󰂈
animation-charging-3 = 󰂉
animation-charging-4 = 󰂊
animation-charging-foreground = ${colors.foreground}
animation-charging-framerate  = 750

animation-low-0 = 󰂃
animation-low-1 = 󰁺
animation-low-foreground = ${colors.warn}
animation-low-framerate  = 400

[module/tray]
type = internal/tray
tray-spacing = 8
tray-background = ${colors.background}

[settings]
screenchange-reload = true
pseudo-transparency = false
