
# ~/.config/alacritty/alacritty.yml

# Colors
[colors]
  primary = { background = "#282828", foreground = "#ebdbb2" }

  [colors.normal]
  black   = "#282828"
  red     = "#cc241d"
  green   = "#98971a"
  yellow  = "#d79921"
  blue    = "#458588"
  magenta = "#b16286"
  cyan    = "#689d6a"
  white   = "#a89984"

  [colors.bright]
  black   = "#928374"
  red     = "#fb4934"
  green   = "#b8bb26"
  yellow  = "#fabd2f"
  blue    = "#83a598"
  magenta = "#d3869b"
  cyan    = "#8ec07c"
  white   = "#ebdbb2"

[window]

# opacity = 0.9

padding.x = 10
padding.y = 10

decorations = "Full"
decorations_theme_variant =  "Dark"

[font]

normal.family = "Fira Code"
bold.family = "Liberation"
italic.family = "Roboto "
bold_italic.family = "Liberation"

size = 12.0
